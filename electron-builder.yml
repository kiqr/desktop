appId: com.kiqr.desktop
productName: KIQR Desktop
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,biome.json,tsconfig.json,tsconfig.*.json}'
  - '!{README.md,LICENSE}'
  - '!tests/*'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Development
nsis:
  artifactName: ${name}-${version}-setup.${ext}
publish: null
